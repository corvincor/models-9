<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Lab: AR YouTube, Model & Camera Switch</title>
  
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.147.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.147.0/examples/jsm/",
      "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
    }
  }
  </script>
  
  <style>
    html, body { position: relative; margin: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
    
    #ar-div { visibility: hidden; }
    iframe { width: 1000px; height: 562px; border: none; }

    #switch-camera-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 10000;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 2px solid white;
      background: rgba(0, 0, 0, 0.5);
      color: white;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
    }
    #switch-camera-btn:active { background: rgba(255, 255, 255, 0.3); }

    #loading-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.85);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20000;
      opacity: 1;
      transition: opacity 0.5s;
    }
  </style>
</head>
<body>

  <div id="ar-div"><div id="player"></div></div>

  <button id="switch-camera-btn">🔄</button>
  <div id="loading-overlay">
    <h2>АР Лабораторна</h2>
    <p>Запуск камери...</p>
    <p style="font-size: 0.8em; color: #aaa;">(Надайте дозвіл камери, якщо з'явиться запит)</p>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { MindARThree } from 'mindar-image-three';
    import { CSS3DObject } from 'three/addons/renderers/CSS3DRenderer.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    function getVideoId(url) {
      const urltypes = ["https://www.youtube.com/shorts/", "https://youtu.be/", "https://www.youtube.com/watch?v="];
      if(url.startsWith(urltypes[0])) return url.substring(urltypes[0].length);
      if(url.startsWith(urltypes[1])) return url.substring(urltypes[1].length);
      if(url.startsWith(urltypes[2])) {
        let s = url.substring(urltypes[2].length);
        let index = s.indexOf("&");
        return (index === -1) ? s : s.substring(0, index);
      }
      return url;
    }

    const createYoutube = (url) => {
      return new Promise((resolve) => {
        const tag = document.createElement("script");
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName("script")[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
        window.onYouTubeIframeAPIReady = () => {
          const player = new YT.Player("player", {
            videoId: getVideoId(url),
            events: { onReady: () => resolve(player) }
          });
        }
      });
    }

    const start = async () => {
      const player = await createYoutube("https://www.youtube.com/watch?v=ywVRLuN6KWA");

      const mindarThree = new MindARThree({
        container: document.body,
        imageTargetSrc: "targets.mind"
      });
      const {renderer, cssRenderer, scene, cssScene, camera} = mindarThree;

      const switchBtn = document.getElementById('switch-camera-btn');
      const overlay = document.getElementById('loading-overlay');

      switchBtn.addEventListener('click', () => {
        mindarThree.switchCamera();
      });

      const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
      scene.add(light);
      const obj = new CSS3DObject(document.querySelector("#ar-div"));
      const cssAnchor = mindarThree.addCSSAnchor(0);
      cssAnchor.group.add(obj);
      cssAnchor.onTargetFound = () => player.playVideo();
      cssAnchor.onTargetLost = () => player.pauseVideo();

      const gltfLoader = new GLTFLoader();
      const anchor1 = mindarThree.addAnchor(1);
      gltfLoader.load("https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models/2.0/Fox/glTF-Binary/Fox.glb", (gltf) => {
        gltf.scene.scale.set(0.01, 0.01, 0.01);
        gltf.scene.position.set(0, -0.2, 0);
        anchor1.group.add(gltf.scene);
      });

      await mindarThree.start();
      
      overlay.style.opacity = '0';
      setTimeout(() => overlay.style.display = 'none', 500);

      renderer.setAnimationLoop(() => {
        cssRenderer.render(cssScene, camera);
        renderer.render(scene, camera);
      });
    }
    
    window.addEventListener('load', start);
  </script>
</body>
</html>
